<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Gallery</title>
  </head>

  <body>
    <section class="gallery">
      <h2>Галерея найкрасивіших островів</h2>

      <figure class="gallery__item gallery__item--wide">
        <img
          class="gallery__image"
          src="./images/maldives.jpeg"
          alt="Мальдіви"
        />
        <figcaption class="gallery__caption">Мальдіви</figcaption>
      </figure>

      <figure class="gallery__item gallery__item--tall">
        <img
          class="gallery__image"
          src="./images/bora-bora.jpeg"
          alt="Бора-Бора, Французька Полінезія"
        />
        <figcaption class="gallery__caption">Бора-Бора</figcaption>
      </figure>

      <figure class="gallery__item">
        <img
          class="gallery__image"
          src="./images/palawan.jpeg"
          alt="Палаван, Філіппіни"
        />
        <figcaption class="gallery__caption">Палаван</figcaption>
      </figure>

      <figure class="gallery__item">
        <img
          class="gallery__image"
          src="./images/bali.png"
          alt="Балі, Індонезія"
        />
        <figcaption class="gallery__caption">Балі, Індонезія</figcaption>
      </figure>

      <figure class="gallery__item">
        <img class="gallery__image" src="./images/fiji.jpeg" alt="Фіджі" />
        <figcaption class="gallery__caption">Фіджі</figcaption>
      </figure>

      <figure class="gallery__item">
        <img
          class="gallery__image"
          src="./images/phuket.jpeg"
          alt="Пхукет, Таїланд"
        />
        <figcaption class="gallery__caption">Пхукет, Таїланд</figcaption>
      </figure>
    </section>
  </body>
</html>
